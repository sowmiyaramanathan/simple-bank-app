name: deploy to production

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Load secrets and save to app.env
        run: |
          # 1. Fetch raw secret directly to a temporary file
          aws secretsmanager get-secret-value --secret-id simple_bank --region ap-south-1 --query SecretString --output text > raw_secret.json

          # 2. Use an updated jq filter pattern to convert JSON keys to ENV lines
          jq -r 'to_entries | .[] | "\(.key)=\(.value)"' raw_secret.json > app.env

          # 3. Add a check to fail the build if the file is blank
          if [ ! -s app.env ]; then
            echo "ERROR: The generated app.env file is completely empty!"
            echo "Printing raw secret output for debugging:"
            cat raw_secret.json
            exit 1
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: simplebank
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
