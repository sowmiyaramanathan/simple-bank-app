version: "1"
packages:
  - name: "db"
    path: "./db/sqlc"
    queries: "./db/query/"
    schema: "./db/migration/"
    engine: "postgresql"
    emit_prepared_queries: false
    emit_interface: true #generate querirer interface for the generated package
    emit_exact_table_names: false
    emit_json_tags: true # adding json tags to the generated struct
    emit_empty_slices: true # generate empty slices for empty record returned by :many query